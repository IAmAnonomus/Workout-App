<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div id="topBar">
    <div id="streak">Streak: 0</div>
    <div id="status"></div>
  </div>

  <!-- HOME -->
  <div id="home">
    <button id="startBtn">Start Workout</button>
  </div>

  <!-- WORKOUT -->
  <div id="workout" class="hidden">
    <h1 id="exerciseName"></h1>
    <img id="exerciseImg" />
    <p id="exerciseReps"></p>

    <div id="controls">
      <button id="nextBtn">Next Set</button>
      <button id="endBtn">End</button>
    </div>

    <button id="finishBtn" class="hidden">FINISH</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
